name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, check, test
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Install task
        uses: arduino/setup-task@v1

      - name: Cache just
        uses: extractions/setup-just@v2

      - name: Lint Markdown
        run: npx --yes markdownlint-cli2 'README.md' 'docs/**/*.md' 2>&1 || true

      - name: Lint Rust
        run: cargo fmt --all -- --check && cargo clippy --all-targets --all-features -- -D warnings

      - name: Check + test
        run: cargo check --all-features && cargo test --all-features

      - name: cargo-deny
        run: |
          cargo install --locked cargo-deny || true
          cargo deny check licenses

      - name: cargo-audit
        run: |
          cargo install --locked cargo-audit || true
          cargo audit

  build-example:
    name: Build example
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build example
        run: cargo build --example basic

  # Always-on TruffleHog scan of the default branch (no BASE/HEAD
  # comparison, so it works on the first commit too).
  secrets-default-branch:
    name: TruffleHog (default branch scan)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog scan (default branch)
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          base: ""
          head: ${{ github.event.repository.default_branch }}
          extraArgs: --no-history
